name: Reliability Guardrails

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Initialize python-prototype submodule
        run: git submodule update --init python-prototype

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"

      - name: Install python-prototype deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --group ./python-prototype/pyproject.toml:dev -e ./python-prototype

      - name: Run notebook runtime tests (bounded)
        run: |
          timeout 600 python -m pytest -q python-prototype/tests

  control-plane-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      - name: Router config smoke validation
        run: |
          node ./scripts/route_config_smoke.mjs

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: false
          tags: gruff:latest
          load: true
