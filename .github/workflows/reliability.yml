name: Reliability Guardrails

on:
  push:
  pull_request:

jobs:
  python-runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python-prototype deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python-prototype[dev]

      - name: Run notebook runtime tests (bounded)
        run: |
          timeout 600 python -m pytest -q python-prototype/tests

  control-plane-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Router config smoke validation
        run: |
          node ./scripts/route_config_smoke.mjs
