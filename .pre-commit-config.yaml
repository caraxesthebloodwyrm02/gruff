# .pre-commit-config.yaml — gruff workspace pre-commit configuration
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Design-system includes hero GIFs larger than 1MB
        args: ['--maxkb=25000']
      - id: double-quote-string-fixer
      - id: name-tests-test
        args: ['--pytest-test-first']
  - repo: local
    hooks:
      - id: prince-signature-layer-registry
        name: prince-signature-layer-registry
        entry: python3 /home/irfankabir/validate_project_registry.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push, manual]
