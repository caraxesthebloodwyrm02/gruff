# .pre-commit-config.yaml — gruff workspace pre-commit configuration
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Design-system includes hero GIFs larger than 1MB
        args: ['--maxkb=25000']
      - id: double-quote-string-fixer
      - id: name-tests-test
        args: ['--pytest-test-first']
