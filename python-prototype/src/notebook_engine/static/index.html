<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUFF GEOMETRY BOX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0F;
            --panel: rgba(23, 23, 31, 0.88);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #F5F5F8;
            --text-muted: #8A8A9E;
            --accent: #F59E0B;
            --accent-soft: rgba(245, 158, 11, 0.55);
            --online: #34D399;
            --offline: #F87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            cursor: crosshair;
        }

        .topbar {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            pointer-events: none;
        }

        .topbar-panel {
            pointer-events: auto;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            backdrop-filter: blur(8px);
        }

        .brand {
            padding: 10px 14px;
        }

        .brand-wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent-soft);
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
        }

        .status-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--offline);
        }

        .status-dot.online {
            background: var(--online);
        }

        button {
            appearance: none;
            border: 1px solid rgba(245, 158, 11, 0.35);
            background: rgba(245, 158, 11, 0.12);
            color: var(--text);
            border-radius: 8px;
            padding: 9px 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        input[type="text"],
        select {
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            border-radius: 8px;
            padding: 9px 10px;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            min-width: 120px;
        }

        input::placeholder {
            color: rgba(138, 138, 158, 0.8);
        }

        button:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hud {
            position: fixed;
            bottom: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
        }

        .hud-panel {
            font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--panel);
            padding: 8px 12px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            backdrop-filter: blur(8px);
            line-height: 1.5;
        }

        .hud-wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent-soft);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .hud-coord {
            color: var(--accent);
        }

        .hud-hint {
            color: rgba(138, 138, 158, 0.6);
            font-size: 10px;
            margin-top: 2px;
        }

        @media (max-width: 720px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <canvas id="nb"></canvas>
    <div class="topbar">
        <div class="topbar-panel brand">
            <div class="brand-wordmark">GRUFF GEOMETRY BOX</div>
            <div class="brand-sub">Live notebook canvas for block geometry</div>
        </div>
        <div class="topbar-panel controls">
            <div class="status-chip" id="live-status">
                <span class="status-dot" id="live-dot"></span>
                <span id="live-text">offline</span>
            </div>
            <input id="label-input" type="text" maxlength="80" placeholder="Block label (optional)">
            <select id="tone-select" aria-label="Block tone">
                <option value="amber">Amber</option>
                <option value="mint">Mint</option>
                <option value="azure">Azure</option>
                <option value="rose">Rose</option>
                <option value="slate">Slate</option>
            </select>
            <button id="clear-btn" type="button">Clear Board</button>
        </div>
    </div>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-wordmark">GRID - GEOMETRY</div>
            <div>cell <span class="hud-coord" id="cell-display">-</span></div>
            <div class="hud-hint">drag draw - ctrl+z undo - right-click delete</div>
        </div>
    </div>
    <script src="/static/notebook.js"></script>
</body>
</html>
