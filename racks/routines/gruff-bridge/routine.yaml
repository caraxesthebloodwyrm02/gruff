name: gruff-bridge
intent: |
  Manual rehearsal of the GRUFF proportion JSON contract: wall board canvas output,
  local Echoes stub POST, and future real Echoes route. Not merged into audit NDJSON
  until explicitly mapped (see CLAUDE.md Data Contracts).
trigger: manual
timeout: 10m
retry_policy:
  max_attempts: 1
  backoff: fixed
  initial_delay_ms: 500
owner: prince
lock_key: routine:gruff-bridge
dispatches:
  - tool: record_gruff_proportion
    server: echoes-server
    description: >
      Post a gruff-proportion-v1 payload to echoes-server via the MCP tool
      record_gruff_proportion. Payload is persisted to gruff-proportions.ndjson
      and a corresponding audit entry is written to audit.ndjson.
produces:
  - "gruff-proportions.ndjson (echoes DATA_DIR)"
  - "audit entry (source: gruff, tool: proportion)"
status: active
references:
  - ../../../schemas/gruff-proportion-v1.schema.json
  - ../../../docs/GRUFF_WALLBOARD_BRIDGE.md
  - ../../../python-prototype/src/gruff/bridge.py
