# ─────────────────────────────────────────────────────────────────────────────
# Signal Extraction Spec — MCP Maintenance
# ─────────────────────────────────────────────────────────────────────────────
# Reproducible sequence for isolating probe tick marks, quantizing actionability,
# and computing alignment against the GRUFF 2026-04-06 baseline.
#
# Invoked by: racks/routines/mcp-maintenance/routine.yaml (probe 1–7)
# Hooks:      craft-server.render(gruff_compass_x) for visual alignment contrast
# ─────────────────────────────────────────────────────────────────────────────

name: signal-extraction
version: 1.0
owner: prince
status: active
hook: gruff-compass-x

intent: |
  Extract every tick mark from the mcp-probe.sh output, classify by signal type,
  quantize per-finding actionability, and compute the alignment score against
  the GRUFF ecosystem baseline. Every step is idempotent and reproducible.

# ─── BASELINE REFERENCE ──────────────────────────────────────────────────────
baseline:
  reference: GRUFF-2026-04-06
  source: .windsurf/workflows/lumos.md
  dimensions:
    health:   { weight: 0.30, domain: [0, 1] }
    trust:    { weight: 0.25, domain: [0, 1] }
    drift:    { weight: 0.20, domain: [0, 1], inverted: true }
    fail:     { weight: 0.15, domain: [0, 1], inverted: true }
    momentum: { weight: 0.10, domain: [0, 1] }
  reference_scores:
    afloat:       73.5   # CLEAR tier
    echoes:       69.5   # CLEAR tier
    seeds-server: 67.0   # CLEAR tier
    grid-server:  47.5   # ACT tier

# ─── SIGNAL TAXONOMY ─────────────────────────────────────────────────────────
signals:
  pass:
    glyph: "✅"
    regex: '^\s+✅'
    weight: 1.0
    semantic: "probe succeeded — contributes to baseline alignment"
  fail:
    glyph: "🔴"
    regex: '^\s+🔴'
    weight: 0.0
    semantic: "probe failed — deviation from baseline, requires action"
  warn:
    glyph: "⚠️"
    regex: '^\s+⚠️'
    weight: 0.5
    semantic: "probe warned — context signal, not alignment-relevant"
  detail:
    glyph: "·"
    regex: '^\s+·'
    weight: null
    semantic: "detail subordinate to a parent signal — do not count"

# ─── EXTRACTION SEQUENCE ─────────────────────────────────────────────────────
# Each step is idempotent. Run in order. Bridges all gaps in reproducibility.
steps:
  - id: S1
    name: probe-run
    verb: probe
    command: ~/scripts/mcp-probe.sh
    produces: stdout-raw
    idempotent: true

  - id: S2
    name: tick-isolate
    verb: isolate
    command: |
      sed -n '/━━━ REPORT: summary ━━━/q; p' stdout-raw \
        | grep -E '^\s+(✅|🔴|⚠️|·)' \
        | sed 's/^\s*//'
    produces: ticks-flat
    idempotent: true
    gap-bridged: "raw probe output contains section headers, box borders, AND
                  a REPORT summary that re-echoes fail/warn findings. The
                  sed cutoff at the REPORT banner prevents double-counting."

  - id: S3
    name: classify
    verb: classify
    logic: |
      for line in ticks-flat:
        case line[0]:
          ✅ → signals.pass   += 1
          🔴 → signals.fail   += 1
          ⚠️ → signals.warn   += 1
          ·  → signals.detail += 1 (subordinate — not counted)
    produces: signal-counts
    idempotent: true

  - id: S4
    name: finding-expand
    verb: expand
    logic: |
      for each 🔴/⚠️:
        collect subordinate · lines until next ✅/🔴/⚠️
        attach as .children[] on parent finding
    produces: findings-tree
    idempotent: true
    gap-bridged: "detail bullets (·) are subordinate to their parent signal;
                  flat grep loses hierarchy. This step re-nests them."

  - id: S5
    name: quantize
    verb: quantize
    formula: |
      Q = impact(0.40) + freshness(0.25) + sed_safety(0.20) + git_tracked(0.15)
    inputs:
      impact:      { source: "static heuristic + grep context inspection", range: [0, 1] }
      freshness:   { source: "file mtime / 30d", range: [0, 1] }
      sed_safety:  { source: "match uniqueness + char-class safety", range: [0, 1] }
      git_tracked: { source: "git ls-files", range: [0, 1] }
    produces: per-finding-Q-scores
    idempotent: true

  - id: S6
    name: dispose
    verb: dispose
    thresholds:
      adapt:   { min: 0.50, action: "fix in place (sed/edit)" }
      roll:    { max: 0.49, action: "accept as-is (defer or regenerate from source)" }
      escalate: { trigger: "Q ≥ 0.85 AND runtime-break", action: "URGENT — block startup" }
    produces: disposition-ledger
    idempotent: true

  - id: S7
    name: align
    verb: align
    formula: |
      A = PATH_current / PATH_baseline
    inputs:
      PATH_current:  { source: "S5 aggregated, weighted by signal.weight" }
      PATH_baseline: { source: "GRUFF-2026-04-06 reference_scores" }
    produces: alignment-score
    idempotent: true
    hook: canvas-wheel-adapter
    command: |
      ~/scripts/mcp-probe.sh | ~/scripts/mcp-probe-adapter.py --json
    downstream: |
      POST /api/v1/canvas/probe-alignment (when Canvas server live)
      or ~/scripts/mcp-probe-adapter.py --ascii (standalone)

  - id: S8
    name: render
    verb: render
    hook: craft-server
    mcp_tool: render_module
    args:
      module: gruff_compass_x
      target: gruff_compass_x
      params:
        baseline: "${baseline.reference_scores}"
        current:  "${S7.alignment-score}"
    produces: out/gruff_compass_x_contrast.png
    idempotent: true
    gap-bridged: "numeric alignment is hard to read at a glance;
                  gruff_compass_x renders baseline vs current as geometric contrast."

# ─── GRUFF HOOK ──────────────────────────────────────────────────────────────
gruff_hook:
  server: craft-server
  mcp_tool: render_module
  module_family: gruff_geometric_sketch
  variants:
    baseline_contrast: gruff_compass_x    # baseline vs current integration map
    movement:          gruff_shift_cycles # 5-cycle motion capture
    full_scope:        gruff_360          # cartesian + polar wide view
    reference:         gruff_sketch       # canonical geometry field
  invocation:
    command: |
      npx -y tsx ${HOME}/workspace/CascadeProjects/Tools/MCPServers/craft-server/src/server.ts
    tool_call:
      name: render_module
      arguments:
        module: gruff_compass_x
    expected_output: ~/workspace/CascadeProjects/Tools/MCPServers/craft-server/out/gruff_compass_x_contrast.png

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────
produces:
  - ~/.maintain-server/reports/signal-audit-adapt-vs-roll.md   # per-finding ledger
  - ~/.maintain-server/reports/mcp-probe-latest.md              # probe summary
  - ~/workspace/CascadeProjects/Tools/MCPServers/craft-server/out/gruff_compass_x_contrast.png

# ─── REPRODUCIBILITY CONTRACT ────────────────────────────────────────────────
reproducibility:
  idempotent: true
  deterministic: "given identical filesystem state, produces identical Q scores"
  prerequisites:
    - "~/scripts/mcp-probe.sh executable"
    - "mcp_config.json present at canonical path"
    - "craft-server reachable via mcp_config.json"
  failure_modes:
    - id: F1
      condition: "mcp-probe.sh exit > 1"
      remedy: "inspect stdout; likely set -euo pipefail tripped by arithmetic on 0"
    - id: F2
      condition: "craft-server render fails"
      remedy: "verify DEFAULT_CRAFT_ROOT = /home/irfankabir/roots/python-craft exists"
    - id: F3
      condition: "grep returns empty on non-empty probe output"
      remedy: "check terminal encoding — emoji require UTF-8 locale"

# ─── REFERENCES ──────────────────────────────────────────────────────────────
references:
  - ../../../scripts/mcp-probe.sh
  - ../../../.maintain-server/reports/signal-audit-adapt-vs-roll.md
  - ../../../workspace/CascadeProjects/Tools/MCPServers/craft-server/src/server.ts
  - ../../../workspace/CascadeProjects/.windsurf/workflows/lumos.md
  - ./routine.yaml
