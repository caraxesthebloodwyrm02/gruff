<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notebook-engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0F;
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #F5F5F8;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            cursor: crosshair;
        }

        .hud {
            position: fixed;
            bottom: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
        }

        .hud-panel {
            font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
            font-size: 11px;
            color: #8A8A9E;
            background: rgba(23, 23, 31, 0.88);
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            backdrop-filter: blur(8px);
            line-height: 1.5;
        }

        .hud-wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: rgba(245, 158, 11, 0.55);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .hud-coord {
            color: #F59E0B;
        }

        .hud-hint {
            color: rgba(138, 138, 158, 0.6);
            font-size: 10px;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <canvas id="nb"></canvas>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-wordmark">GRID - notebook</div>
            <div>cell <span class="hud-coord" id="cell-display">-</span></div>
            <div class="hud-hint">drag to draw  -  ctrl+z undo  -  right-click delete</div>
        </div>
    </div>
    <script src="/static/notebook.js"></script>
</body>
</html>
